
@if (showTrigger()) {
  <app-icon-button
    icon="plus"
    label="Add group"
    variant="primary"
    size="lg"
    (clicked)="open()"
  />
}

@if (isOpen()) {
  <ui-dialog-shell
    title="Create group"
    titleId="create-group-title"
    [showFooter]="true"
    (closed)="close()"
  >
    <form [formGroup]="createForm" (ngSubmit)="submit()" class="create-group-form">
      <ui-form-field label="Group name" [error]="nameError()">
        <ui-text-input
          formControlName="listName"
          placeholder="e.g. Combat Music"
          [maxLength]="nameMaxLength"
        />
      </ui-form-field>
    </form>

    <ng-container dialog-footer>
      <normal-button type="button" variant="secondary" (clicked)="close()">
        Cancel
      </normal-button>
      <normal-button
        type="submit"
        [disabled]="submitting() || !createForm.value.listName?.trim()"
        [loading]="submitting()"
        (clicked)="submit()"
      >
        Create group
      </normal-button>
    </ng-container>
  </ui-dialog-shell>
}
