
@if (showTrigger()) {
  <app-icon-button
    icon="plus"
    label="Add track"
    variant="primary"
    size="lg"
    (clicked)="open()"
  />
}

@if (isOpen()) {
  <ui-dialog-shell
    [title]="isEditing() ? 'Edit track' : 'Add track'"
    titleId="track-modal-title"
    [showFooter]="true"
    (closed)="close()"
  >
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="track-form">
      <ui-form-field label="Track name" [error]="trackNameError()">
        <ui-text-input
          formControlName="trackName"
          placeholder="e.g. Dark Forest Ambience"
          [maxLength]="limits.name"
        />
      </ui-form-field>

      <ui-form-field label="Track link" [error]="trackLinkError()">
        <ui-text-input
          formControlName="trackLink"
          type="url"
          placeholder="https://youtube.com/..."
          [maxLength]="trackLinkMaxLength()"
        />
        @if (linkLocked()) {
          <span class="track-form__hint">
            The link can't be changed once a track has windows or is published.
          </span>
        }
      </ui-form-field>
    </form>

    <ng-container dialog-footer>
      <normal-button
        type="button"
        variant="secondary"
        (clicked)="close()"
      >
        Cancel
      </normal-button>

      <normal-button
        type="submit"
        [disabled]="form.invalid || submitting()"
        [loading]="submitting()"
        (clicked)="onSubmit()"
      >
        {{ isEditing() ? 'Save changes' : 'Add track' }}
      </normal-button>
    </ng-container>
  </ui-dialog-shell>
}
