
@if (showTrigger()) {
  <app-icon-button
    icon="plus"
    label="Add board"
    variant="primary"
    size="lg"
    (clicked)="open()"
  />
}

@if (isOpen()) {
  <ui-dialog-shell
    title="Create board"
    titleId="create-board-title"
    [showFooter]="true"
    (closed)="close()"
  >
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="create-board-form">
    <ui-form-field label="Board name">
      <ui-text-input
        formControlName="name"
        placeholder="e.g. Tavern Ambience"
        [maxLength]="nameMaxLength"
      />
    </ui-form-field>

    <div class="create-board-form__field">
      <label class="app-form-label">Track</label>
      <ui-select
        [options]="trackOptions()"
        nullOption="— no track selected —"
        formControlName="selectedTrackId"
      />
    </div>
  </form>

  <ng-container dialog-footer>
    <normal-button type="button" variant="secondary" (clicked)="close()">
      Cancel
    </normal-button>

    <normal-button
      type="submit"
      [disabled]="submitting()"
      [loading]="submitting()"
      (clicked)="onSubmit()"
    >
      Create board
    </normal-button>
  </ng-container>
  </ui-dialog-shell>
}
