
<div class="app-page app-page--narrow">
  <ui-card title="Login">
    @if (needsVerification()) {
      <app-verification-required (cancel)="onBackToLogin()" />
    } @else {
      @if (formError()) {
        <ui-alert variant="danger" role="alert">{{ formError() }}</ui-alert>
      }

      <form class="app-form-stack" [formGroup]="form" (ngSubmit)="onSubmit()">
        <ui-form-field
          label="Username"
          [error]="nameError()"
        >
          <ui-text-input formControlName="name" autocomplete="username" />
        </ui-form-field>

        <ui-form-field
          label="Password"
          [error]="passwordError()"
        >
          <ui-text-input formControlName="password" type="password" autocomplete="current-password" />
        </ui-form-field>

        <ui-form-actions>
          <normal-button
            type="submit"
            [disabled]="form.invalid || isSubmitting()"
            [loading]="isSubmitting()"
          >
            {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
          </normal-button>
        </ui-form-actions>
      </form>

      <div class="auth-page__link">
        @if (showEmailInputs) {
          <a routerLink="/forgot-password">Forgot password?</a>
        } @else {
          <span class="auth-page__link--disabled" aria-disabled="true">Forgot password?</span>
        }
      </div>

      <div class="auth-page__link">
        <a routerLink="/register">Need an account? Register</a>
      </div>
    }
  </ui-card>

  <app-footer />
</div>
