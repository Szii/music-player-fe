
<nav class="app-navbar">
  <div class="app-navbar__inner">
    <div class="app-navbar__brand">
      <a routerLink="/" class="app-navbar__brand-link">DnD Music</a>
    </div>

    <div class="app-navbar__links">
      <a
        class="app-navbar__link"
        routerLink="/tracks"
        routerLinkActive="app-navbar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >Tracks</a>

      <a
        class="app-navbar__link"
        routerLink="/boards"
        routerLinkActive="app-navbar__link--active"
      >
        Boards
        @if (boardPlayback.isAnyPlaying()) {
          <span class="app-navbar__playing-dot" aria-label="Playing"></span>
        }
      </a>

      <a
        class="app-navbar__link"
        routerLink="/groups"
        routerLinkActive="app-navbar__link--active"
      >Groups</a>

      <a
        class="app-navbar__link"
        routerLink="/workshop"
        routerLinkActive="app-navbar__link--active"
      >Workshop</a>
    </div>

    <div class="app-navbar__actions">
      <app-user-menu (logout)="logout()" />

      @if (warnings.hasWarnings()) {
        <button
          type="button"
          class="app-navbar__warning-btn"
          (click)="warnings.toggleBanners()"
          [attr.aria-expanded]="warnings.anyOpen()"
          aria-label="Environment notices"
          title="Environment notices"
        >
          !
        </button>
      }
    </div>
  </div>
</nav>

<!-- Mobile primary navigation: a thumb-reachable bottom tab bar (replaces
     the hamburger; Apple HIG / Material recommend this for 3–5 sections). -->
<nav class="app-bottom-nav" aria-label="Primary">
  <a
    class="app-bottom-nav__item"
    routerLink="/tracks"
    routerLinkActive="app-bottom-nav__item--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <svg class="app-bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 18V5l12-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="18" cy="16" r="3" />
    </svg>
    <span class="app-bottom-nav__label">Tracks</span>
  </a>

  <a
    class="app-bottom-nav__item"
    routerLink="/boards"
    routerLinkActive="app-bottom-nav__item--active"
  >
    <span class="app-bottom-nav__icon-wrap">
      <svg class="app-bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
      </svg>
      @if (boardPlayback.isAnyPlaying()) {
        <span class="app-bottom-nav__dot" aria-label="Playing"></span>
      }
    </span>
    <span class="app-bottom-nav__label">Boards</span>
  </a>

  <a
    class="app-bottom-nav__item"
    routerLink="/groups"
    routerLinkActive="app-bottom-nav__item--active"
  >
    <svg class="app-bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 20h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-7l-2-2H4a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1Z" />
    </svg>
    <span class="app-bottom-nav__label">Groups</span>
  </a>

  <a
    class="app-bottom-nav__item"
    routerLink="/workshop"
    routerLinkActive="app-bottom-nav__item--active"
  >
    <svg class="app-bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z" />
    </svg>
    <span class="app-bottom-nav__label">Workshop</span>
  </a>
</nav>
