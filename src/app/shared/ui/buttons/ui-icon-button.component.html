
<button
  type="button"
  class="app-icon-btn"
  [class]="classList()"
  [disabled]="disabled()"
  [attr.aria-label]="label()"
  [attr.title]="label()"
  (mousedown)="$event.preventDefault()"
  (click)="clicked.emit()"
>
  <svg
    class="app-icon-btn__icon"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="1.9"
    aria-hidden="true"
  >
    @switch (icon()) {
      @case ('edit') {
        <path d="M4 20h4l10-10-4-4L4 16v4Z" />
        <path d="M12.5 5.5l4 4" />
      }
      @case ('delete') {
        <path d="M5 7h14" />
        <path d="M10 11v6" />
        <path d="M14 11v6" />
        <path d="M8 7l1-2h6l1 2" />
        <path d="M7 7l1 12h8l1-12" />
      }
      @case ('tracks') {
        <path d="M9 18V7l10-2v11" />
        <path d="M9 18a2 2 0 1 1-4 0a2 2 0 0 1 4 0Z" />
        <path d="M19 16a2 2 0 1 1-4 0a2 2 0 0 1 4 0Z" />
      }
      @case ('windows') {
        <path d="M5 6v12" />
        <path d="M19 6v12" />
        <path d="M8 12h8" />
        <path d="M10 10l-2 2 2 2" />
        <path d="M14 10l2 2-2 2" />
      }
      @case ('close') {
        <path d="M6 6l12 12" />
        <path d="M18 6L6 18" />
      }
      @case ('play') {
        <path d="M8 6l10 6-10 6V6Z" fill="currentColor" stroke="none" />
      }
      @case ('pause') {
        <path d="M8 6v12" />
        <path d="M16 6v12" />
      }
      @case ('save') {
        <path d="M5 6a1 1 0 0 1 1-1h9l4 4v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6Z" />
        <path d="M8 5v5h8" />
        <path d="M8 19v-5h8v5" />
      }
      @case ('plus') {
        <path d="M12 5v14" />
        <path d="M5 12h14" />
      }
      @case ('copy') {
        <rect x="9" y="9" width="11" height="11" rx="1.5" />
        <path d="M5 15V5a1 1 0 0 1 1-1h10" />
      }
      @case ('bookmark') {
        <path d="M7 4h10a1 1 0 0 1 1 1v15l-6-4-6 4V5a1 1 0 0 1 1-1Z" />
      }
      @case ('bookmark-remove') {
        <path d="M7 4h10a1 1 0 0 1 1 1v15l-6-4-6 4V5a1 1 0 0 1 1-1Z" fill="currentColor" stroke="none" />
        <path d="M9 10l6 6" stroke="white" stroke-width="2" />
        <path d="M15 10l-6 6" stroke="white" stroke-width="2" />
      }
      @case ('more') {
        <circle cx="12" cy="5" r="1.6" fill="currentColor" stroke="none" />
        <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none" />
        <circle cx="12" cy="19" r="1.6" fill="currentColor" stroke="none" />
      }
      @default {
        <circle cx="12" cy="12" r="7" />
      }
    }
  </svg>
</button>
