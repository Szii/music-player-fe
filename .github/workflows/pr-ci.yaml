name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BACKEND_REPO_OWNER: ${{ vars.BACKEND_REPO_OWNER }}
  BACKEND_REPO_NAME: ${{ vars.BACKEND_REPO_NAME }}
  BACKEND_ASSET_NAME: backend-openapi.yaml

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch backend OpenAPI spec and generate client
        env:
          BACKEND_REPO_TOKEN: ${{ secrets.BACKEND_REPO_TOKEN }}
        run: npm run fetch:api

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless